<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Claude Notify</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
<main class="container">
    <article style="max-width: 400px; margin: 4rem auto;">
        <h2>Claude Notify</h2>
        <p>Sign in to manage approval requests.</p>
        {% for provider in providers %}
        <a href="/auth/start/{{ provider }}" role="button" style="display: block; margin-bottom: 0.5rem;">
            Sign in with {{ provider }}
        </a>
        {% endfor %}
        {% if has_basic_auth %}
        {% if !providers.is_empty() %}
        <hr>
        {% endif %}
        <form method="post" action="/auth/login/basic">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit">Sign in</button>
        </form>
        {% endif %}
        {% if providers.is_empty() && !has_basic_auth %}
        <p><em>No auth providers configured.</em></p>
        {% endif %}
    </article>
</main>
</body>
</html>
